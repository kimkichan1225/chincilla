<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; }
    html, body {
      width: 200px;
      height: 200px;
      overflow: hidden;
      background: transparent;
    }
    #container {
      width: 200px;
      height: 200px;
      position: relative;
    }
    #pet {
      width: 128px;
      height: 128px;
      cursor: grab;
      -webkit-app-region: no-drag;
      image-rendering: pixelated;
      position: absolute;
      bottom: 0;
      left: 36px;
    }
    #pet.flipped {
      transform: scaleX(-1);
    }
    #bubble {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      background: white;
      border: 2px solid #333;
      border-radius: 12px;
      padding: 6px 10px;
      font-size: 12px;
      font-family: 'Malgun Gothic', sans-serif;
      white-space: nowrap;
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
      z-index: 10;
    }
    #bubble::after {
      content: '';
      position: absolute;
      bottom: -8px;
      left: 50%;
      transform: translateX(-50%);
      width: 0;
      height: 0;
      border-left: 6px solid transparent;
      border-right: 6px solid transparent;
      border-top: 8px solid #333;
    }
    #bubble.show {
      opacity: 1;
    }
  </style>
</head>
<body>
  <div id="container">
    <div id="bubble"></div>
    <img id="pet" />
  </div>
  <script>
    const { ipcRenderer } = require('electron');
    const path = require('path');
    const fs = require('fs');

    const pet = document.getElementById('pet');
    const SPRITE_DIR = path.join(__dirname, 'Chinchilla');

    // ── Animation definitions ──
    const ACTIONS = [
      'angry', 'breath', 'eat', 'heart', 'hold',
      'poop', 'sleep', 'stand', 'walk',
    ];

    // Preload all SVGs as data URIs
    const frames = {};
    ACTIONS.forEach(action => {
      frames[action] = [];
      for (let i = 1; i <= 4; i++) {
        const filePath = path.join(SPRITE_DIR, `${action}_f${i}.svg`);
        const svg = fs.readFileSync(filePath, 'utf8');
        frames[action].push('data:image/svg+xml;base64,' + Buffer.from(svg).toString('base64'));
      }
    });

    // ── State machine ──
    let state = 'stand';
    let frameIndex = 0;
    let facingLeft = false; // false = right
    let screenBounds = { width: 1920, height: 1080 };
    let petX = 960;
    let petY = 900;
    let walkSpeed = 2;
    let stateTimer = 0;
    let stateDuration = 120; // frames until next state change
    let isDragging = false;
    let dragOffsetX = 0;
    let dragOffsetY = 0;

    ipcRenderer.on('screen-bounds', (e, bounds) => {
      screenBounds = bounds;
      const pos = ipcRenderer.sendSync('get-position');
      petX = pos.x;
      petY = pos.y;
    });

    // ── State transitions ──
    const IDLE_STATES = ['stand', 'breath', 'sleep', 'eat'];
    const WALK_CHANCE = 0.5;

    function pickNextState() {
      if (state === 'hold') return; // don't auto-transition from hold

      const rand = Math.random();
      if (rand < WALK_CHANCE) {
        state = 'walk';
        // Maybe change direction
        if (Math.random() < 0.3) facingLeft = !facingLeft;
        stateDuration = 100 + Math.floor(Math.random() * 200);
      } else {
        state = IDLE_STATES[Math.floor(Math.random() * IDLE_STATES.length)];
        stateDuration = 80 + Math.floor(Math.random() * 160);
      }
      stateTimer = 0;
      frameIndex = 0;
    }

    // ── Speech bubble ──
    const bubble = document.getElementById('bubble');
    let bubbleTimer = null;

    const MESSAGES = {
      heart: ['좋아!', '헤헤~', '기분 좋다!', '사랑해~', '또 만져줘!', '행복해!'],
      angry: ['화났어!!', '그만해!', '싫어!', '너무해!', '짜증나!'],
      poop: ['뿌직...', '시원하다~', '아무도 안봤지?', '어흑...'],
      sleep: ['zzZ...', '졸려...', '꿈나라...'],
      eat: ['냠냠~', '맛있다!', '더 줘!', '배고팠어~'],
      stand: ['뭐해?', '심심해~', '놀아줘!', '...?'],
      breath: ['후~', '평화롭다~', '좋은 날이다'],
      walk: ['산책 중~', '어디 가볼까?', '여기는 어디?', '탐험 중!'],
      hold: ['으악!', '내려줘!', '높다!', '무서워!'],
    };

    function showBubble(action) {
      const msgs = MESSAGES[action] || MESSAGES.stand;
      const msg = msgs[Math.floor(Math.random() * msgs.length)];
      bubble.textContent = msg;
      bubble.classList.add('show');
      clearTimeout(bubbleTimer);
      bubbleTimer = setTimeout(() => {
        bubble.classList.remove('show');
      }, 2000);
    }

    // ── Click interactions ──
    let clickCount = 0;
    let clickResetTimer = null;

    pet.addEventListener('mousedown', (e) => {
      isDragging = true;
      const pos = ipcRenderer.sendSync('get-position');
      dragOffsetX = e.screenX - pos.x;
      dragOffsetY = e.screenY - pos.y;
      state = 'hold';
      frameIndex = 0;
      pet.style.cursor = 'grabbing';
      showBubble('hold');
    });

    document.addEventListener('mousemove', (e) => {
      if (!isDragging) return;
      petX = e.screenX - dragOffsetX;
      petY = e.screenY - dragOffsetY;
      ipcRenderer.send('move-window', { x: petX, y: petY });
    });

    document.addEventListener('mouseup', (e) => {
      if (!isDragging) return;
      isDragging = false;
      pet.style.cursor = 'grab';

      // Drop: fall to bottom
      const groundY = screenBounds.height - 200;
      petY = groundY;
      ipcRenderer.send('move-window', { x: petX, y: petY });

      // Check if it was a click (not a drag)
      const pos = ipcRenderer.sendSync('get-position');
      clickCount++;
      clearTimeout(clickResetTimer);
      clickResetTimer = setTimeout(() => { clickCount = 0; }, 1000);

      if (clickCount >= 3) {
        state = 'angry';
        stateDuration = 60;
        stateTimer = 0;
        frameIndex = 0;
        clickCount = 0;
        showBubble('angry');
      } else {
        state = 'heart';
        stateDuration = 50;
        stateTimer = 0;
        frameIndex = 0;
        showBubble('heart');
      }
    });

    // ── Right click: poop ──
    pet.addEventListener('contextmenu', (e) => {
      e.preventDefault();
      state = 'poop';
      stateDuration = 60;
      stateTimer = 0;
      frameIndex = 0;
      showBubble('poop');
    });

    // ── Animation loop ──
    const FRAME_RATE = 150; // ms per frame

    function update() {
      // Update frame
      const actionFrames = frames[state];
      if (actionFrames) {
        pet.src = actionFrames[frameIndex % 4];
      }

      // Flip sprite based on direction
      if (facingLeft) {
        pet.classList.remove('flipped');
      } else {
        pet.classList.add('flipped');
      }

      // Walk movement
      if (state === 'walk' && !isDragging) {
        const dir = facingLeft ? -1 : 1;
        petX += dir * walkSpeed;

        // Bounce off screen edges
        if (petX <= 0) {
          petX = 0;
          facingLeft = false;
        } else if (petX >= screenBounds.width - 128) {
          petX = screenBounds.width - 128;
          facingLeft = true;
        }

        ipcRenderer.send('move-window', { x: petX, y: petY });
      }

      // Advance frame
      frameIndex = (frameIndex + 1) % 4;

      // State timer
      if (!isDragging) {
        stateTimer++;
        if (stateTimer >= stateDuration) {
          pickNextState();
        }
      }
    }

    setInterval(update, FRAME_RATE);

    // Start with a brief stand, then go
    setTimeout(() => pickNextState(), 2000);
  </script>
</body>
</html>
